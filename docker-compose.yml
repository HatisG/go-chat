version: '3.8'

services:
  # 1. MySQL 服务
  mysql:
    image: mysql:8.0
    container_name: gochat_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: go_chat
      MYSQL_ROOT_HOST: '%' # 允许任何主机连接，方便调试
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis 服务
  redis:
    image: redis:7-alpine
    container_name: gochat_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. RabbitMQ 服务
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: gochat_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # 应用连接端口
      - "15672:15672"  # 管理界面端口
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Go-Chat 应用服务
  app:
    build: .
    container_name: gochat_app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./uploads:/root/uploads # 持久化上传文件
    environment:
      # 服务配置
      SERVER_PORT: 8080
      SERVER_MODE: release
      # 数据库配置 (服务名就是 container_name)
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: go_chat
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      # RabbitMQ 配置
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      # JWT 配置
      JWT_SECRET: go-chat-secret-key-2024
      JWT_EXPIRE_HOURS: 24

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data: